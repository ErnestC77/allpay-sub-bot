# Render Blueprint для бота продажи подписок (AllPay).
# Создаёт Web Service (aiohttp биндит $PORT для webhook + long-polling бота)
# и базу PostgreSQL 16. Секреты (sync: false) заполняются в дашборде Render.
#
# ВАЖНО про тарифы:
#  - Web Service на плане free засыпает после ~15 мин без входящих запросов —
#    long-polling бота при этом остановится. Для рабочего бота нужен план starter
#    (или выше), либо перевод на Telegram-webhook + внешний пинг /health.
#  - PostgreSQL на плане free удаляется через 90 дней. Для продакшена — платный план.

databases:
  - name: subbot-db
    databaseName: subbot
    user: subbot
    plan: free                 # для продакшена смените на basic-256mb или выше
    postgresMajorVersion: "16"

services:
  - type: web
    name: allpay-sub-bot
    runtime: python
    plan: free                 # ВНИМАНИЕ: уснёт после ~15 мин без запросов и остановит polling
    region: frankfurt          # ближе к Израилю/РФ, чем oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: subbot-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: DEFAULT_CURRENCY
        value: ILS
      - key: REMINDER_CHECK_INTERVAL
        value: "3600"
      # --- секреты: задаются вручную в дашборде (Environment) ---
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: SUPPORT_CONTACT
        sync: false
      - key: ALLPAY_LOGIN
        sync: false
      - key: ALLPAY_KEY
        sync: false
      # WEBHOOK_BASE_URL = публичный URL этого сервиса (например,
      # https://allpay-sub-bot.onrender.com). Заполнить после первого деплоя.
      - key: WEBHOOK_BASE_URL
        sync: false
